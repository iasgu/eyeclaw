name: Feature request
description: Suggest an EyeClaw capability or supported application.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What business or personal workflow should EyeClaw learn or execute?
    validations:
      required: true
  - type: textarea
    id: current_workaround
    attributes:
      label: Current workaround
      description: How do users handle this today?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What would make this feature complete enough to use?
