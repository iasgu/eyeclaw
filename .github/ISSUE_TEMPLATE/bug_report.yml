name: Bug report
description: Report a reproducible EyeClaw problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the browser, target site type, and whether recording/replay was active.
      placeholder: |
        1. Start EyeClaw with ...
        2. Load the extension ...
        3. Record ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets and private customer data before sharing.
      render: text
